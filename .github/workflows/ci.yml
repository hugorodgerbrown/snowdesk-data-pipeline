# .github/workflows/ci.yml — Run formatting, linting, type checks, Django
# checks, and tests via tox on push to main and on pull requests.

name: Python / Django

on:
  push:
    branches:
      - main

  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Check formatting
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toxenv: [fmt, lint, mypy]
    env:
      TOXENV: ${{ matrix.toxenv }}

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python (3.12)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create .env
        run: |
          echo "SECRET_KEY=ci-test-secret-key" > .env
          echo "DJANGO_SETTINGS_MODULE=config.settings.development" >> .env

      - name: Install and run tox
        run: |
          pip install tox
          tox

  checks:
    name: Run Django checks
    runs-on: ubuntu-latest
    env:
      TOXENV: django-checks

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python (3.12)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create .env
        run: |
          echo "SECRET_KEY=ci-test-secret-key" > .env
          echo "DJANGO_SETTINGS_MODULE=config.settings.development" >> .env

      - name: Install and run tox
        run: |
          pip install tox
          tox

  test:
    name: Run tests
    runs-on: ubuntu-latest
    env:
      TOXENV: test

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python (3.12)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create .env
        run: |
          echo "SECRET_KEY=ci-test-secret-key" > .env
          echo "DJANGO_SETTINGS_MODULE=config.settings.development" >> .env

      - name: Install and run tox
        run: |
          pip install tox
          tox

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python (3.12)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry, export plugin, and pip-audit
        run: pip install poetry poetry-plugin-export pip-audit

      - name: Export locked dependencies
        run: >-
          poetry export
          --without-hashes
          --format=requirements.txt
          --output=/tmp/requirements-audit.txt

      - name: Audit dependencies for known CVEs
        run: pip-audit -r /tmp/requirements-audit.txt
