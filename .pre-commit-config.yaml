repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: debug-statements

  # Python static type checking. Runs as a local hook so mypy executes
  # inside the project's poetry venv, where django-stubs and every
  # runtime dependency is already installed. This avoids mirroring the
  # full dependency graph as `additional_dependencies` (django-stubs
  # boots Django to resolve model field types, which pulls in the
  # entire app import chain).
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: poetry run mypy pipeline/ public/
        language: system
        types: [python]
        pass_filenames: false
