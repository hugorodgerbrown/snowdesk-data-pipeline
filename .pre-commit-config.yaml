repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: debug-statements

  # Local hooks pointing directly at the in-project venv's binaries.
  # Using `.venv/bin/<tool>` (rather than `poetry run <tool>`) avoids
  # depending on PATH, so the hooks work identically from the CLI and
  # from GUI git clients like SublimeMerge that launch git with a
  # minimal environment and don't inherit the user's shell PATH.
  - repo: local
    hooks:
      - id: djhtml
        name: djhtml
        entry: .venv/bin/djhtml
        language: system
        types_or: [html]

      - id: mypy
        name: mypy
        entry: .venv/bin/mypy pipeline/ public/ tests/ config/
        language: system
        types: [python]
        pass_filenames: false
