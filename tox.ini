[tox]
no_package = True
envlist =
    fmt, lint, mypy,
    django-checks,
    test

[testenv:test]
description = Run tests with coverage
deps =
    coverage
    pytest
    pytest-cov
    pytest-django
    Django
    django-htmx
    django-csp-plus
    python-decouple
    requests
    factory-boy
    django-ratelimit
    freezegun
    pyyaml
    bleach
    shapely
setenv =
    DJANGO_SETTINGS_MODULE = config.settings.development
commands =
    pytest --cov=pipeline --cov=bulletins --cov=public --cov=subscriptions --cov=config tests/

[testenv:django-checks]
description = Django system checks and missing migrations
deps =
    Django
    django-htmx
    django-csp-plus
    python-decouple
    requests
    django-ratelimit
    pyyaml
    bleach
setenv =
    DJANGO_SETTINGS_MODULE = config.settings.development
commands =
    python manage.py check --fail-level WARNING
    python manage.py makemigrations --dry-run --check --verbosity 3

[testenv:fmt]
description = Python source code formatting (ruff format)
deps =
    ruff
commands =
    ruff format --check .

[testenv:lint]
description = Python source code linting and import sorting (ruff)
deps =
    ruff
commands =
    ruff check .

[testenv:audit]
description = Check for known CVEs in pinned dependencies (pip-audit)
skip_install = True
deps =
    pip-audit
allowlist_externals =
    poetry
commands =
    poetry export --without-hashes --format=requirements.txt --output={envtmpdir}/requirements.txt
    pip-audit --requirement {envtmpdir}/requirements.txt

[testenv:sast]
description = Static analysis (semgrep) — Django + Python rulesets
skip_install = True
deps =
    semgrep
# Excluded rules (high false-positive rate on idiomatic Django code):
#   * template-blocktranslate-no-escape / template-translate-as-no-escape
#     — fire on every {% blocktrans %} / {% trans X as Y %}; mitigation
#       (|force_escape on interpolated values) doesn't satisfy the pattern.
#   * generic var-in-href — fires on every href="{{ url }}" even when the
#     value is the output of {% url 'name' %} (server-derived).
#   * logger-credential-leak — string-matches log-message wording (e.g.
#     "valid token for unknown email"); too noisy to be actionable.
commands =
    semgrep --config=p/django --config=p/python --config=p/security-audit \
        --exclude-rule=python.django.security.audit.xss.template-blocktranslate-no-escape.template-blocktranslate-no-escape \
        --exclude-rule=python.django.security.audit.xss.template-translate-as-no-escape.template-translate-as-no-escape \
        --exclude-rule=generic.html-templates.security.var-in-href.var-in-href \
        --exclude-rule=python.lang.security.audit.logging.logger-credential-leak.python-logger-credential-disclosure \
        --error --quiet \
        --exclude=.venv --exclude=node_modules --exclude=.claude \
        --exclude=migrations --exclude=tests \
        .

[testenv:mypy]
description = Python source code type hints (mypy)
deps =
    mypy
    Django
    django-htmx
    django-csp-plus
    django-stubs
    python-decouple
    requests
    types-requests
    django-ratelimit
    factory-boy
    bleach
    types-bleach
    shapely
setenv =
    DJANGO_SETTINGS_MODULE = config.settings.development
commands =
    mypy pipeline/ bulletins/ public/ subscriptions/ tests/ config/
